<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 희진이 생일 축하해 🎂</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(-45deg,#ff6ec7,#7873f5,#4ade80,#ffd700);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Malgun Gothic',sans-serif;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    text-align:center;
    color:white;
    z-index:10;
}

.title{
    font-size:70px;
    font-weight:bold;
    text-shadow:0 0 20px gold;
    animation:spin 6s linear infinite;
}

@keyframes spin{
    0%{transform:rotateY(0deg);}
    100%{transform:rotateY(360deg);}
}

.subtitle{
    margin-top:20px;
    font-size:32px;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px white;
    }
    to{
        text-shadow:
        0 0 20px yellow,
        0 0 40px gold,
        0 0 60px orange;
    }
}

.message{
    margin-top:40px;
    font-size:25px;
    line-height:1.8;
    background:rgba(255,255,255,0.15);
    padding:25px;
    border-radius:20px;
    backdrop-filter:blur(10px);
}

.heart{
    position:absolute;
    color:pink;
    font-size:30px;
    animation:float 8s linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(100vh) rotate(0deg);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        transform:translateY(-120vh) rotate(720deg);
        opacity:0;
    }
}

.sparkle{
    position:absolute;
    color:yellow;
    animation:spark 4s linear infinite;
}

@keyframes spark{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    to{
        transform:translateY(-100vh);
        opacity:1;
    }
}
</style>
</head>

<body>

<div class="container">

<h1 class="title">🎉 HAPPY BIRTHDAY 🎉</h1>

<h2 class="subtitle">
✨ 2026년 6월 4일 ✨<br>
🎂 희진아 생일 축하해 🎂
</h2>

<div class="message">
💖 오늘!!!!!!! 누구보다 가장 행복한 날 되길 바래 💖<br><br>

🌸 시험도 시험이지만 오늘 가장 기쁜 날 되었으면 좋겠다잉🌸<br>

✨ 앞으로의 모든 순간들이!!!!! 빛날거야 우하하하 ✨<br>

🎁 하고 싶은 거 많이 하고 맛난 거 많이 먹고!!!!!!<br>
🍀 좋은 일만 가득하고<br>
💎 사랑한다잉 💎<br><br>

🎊 HAPPY BIRTHDAY HEEJIN 🎊
</div>

</div>

<script>

for(let i=0;i<40;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💖";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(Math.random()*5+4)+"s";
    heart.style.fontSize=(Math.random()*30+20)+"px";
    document.body.appendChild(heart);
}

for(let i=0;i<50;i++){
    let star=document.createElement("div");
    star.className="sparkle";
    star.innerHTML="✨";
    star.style.left=Math.random()*100+"vw";
    star.style.animationDuration=(Math.random()*4+2)+"s";
    document.body.appendChild(star);
}

</script>

</body>
</html>
